<!DOCTYPE html>
<!-- Źródło og-image.png — wyrenderuj przez headless Chrome/Edge:
     msedge --headless --screenshot=og-image.png --window-size=1200,630 og-image.html -->
<html lang="pl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #faf9f6;
    font-family: 'Inter', system-ui, sans-serif;
    color: #191d17;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px 64px 48px;
  }
  /* miękka szałwiowa poświata w rogu */
  .glow {
    position: absolute;
    right: -180px; top: -180px;
    width: 560px; height: 560px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(70,121,95,0.14), rgba(70,121,95,0) 70%);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    align-self: flex-start;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #46795f;
    background: rgba(70, 121, 95, 0.08);
    border: 1px solid rgba(25, 29, 23, 0.08);
    border-radius: 999px;
    padding: 10px 22px;
  }
  .badge::before {
    content: '';
    width: 11px; height: 11px;
    border-radius: 50%;
    background: #46795f;
  }
  h1 {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 108px;
    line-height: 0.95;
    letter-spacing: -0.035em;
  }
  h1 .accent { color: #46795f; }
  h1 .dot { color: #46795f; }
  .stack {
    font-family: 'JetBrains Mono', monospace;
    font-size: 21px;
    letter-spacing: 0.06em;
    color: #61695f;
    margin-top: 26px;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .name { font-size: 22px; font-weight: 600; color: #333a31; }
  .url { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #46795f; }
</style>
</head>
<body>
  <div class="glow"></div>
  <span class="badge">dostępny do współpracy</span>
  <div>
    <h1>FULL<span class="dot">·</span>STACK<br><span class="accent">DEVELOPER</span></h1>
    <div class="stack">Next.js · Node.js · PostgreSQL · Stripe Connect</div>
  </div>
  <div class="bottom">
    <span class="name">Dmytro Zatserkivnyi</span>
    <span class="url">dmytro-dev.pl</span>
  </div>
</body>
</html>
